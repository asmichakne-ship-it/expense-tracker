<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">💸 SpendWise</div>
      <p class="tagline">Track. Analyse. Save.</p>
    </div>
  </header>

  <!-- SUMMARY CARDS -->
  <section class="summary-section">
    <h2 class="section-title">Your Spending Summary</h2>
    <div class="summary-cards">
      <div class="card card-week">
        <span class="card-label">This Week</span>
        <span class="card-amount" id="weekly">₹0.00</span>
      </div>
      <div class="card card-month">
        <span class="card-label">This Month</span>
        <span class="card-amount" id="monthly">₹0.00</span>
      </div>
      <div class="card card-year">
        <span class="card-label">This Year</span>
        <span class="card-amount" id="yearly">₹0.00</span>
      </div>
      <div class="card card-total">
        <span class="card-label">All Time</span>
        <span class="card-amount" id="total">₹0.00</span>
      </div>
    </div>
  </section>

  <!-- ADD / EDIT FORM -->
  <section class="form-section">
    <h2 class="section-title" id="form-heading">Add New Expense</h2>
    <div class="form-box">
      <input type="hidden" id="editId" value="" />

      <div class="form-row">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="title" placeholder="e.g. Lunch, Uber ride..." />
        </div>
        <div class="form-group">
          <label>Amount (₹)</label>
          <input type="number" id="amount" placeholder="0.00" min="0" step="0.01"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="category">
            <option value="Food">🍔 Food</option>
            <option value="Transport">🚌 Transport</option>
            <option value="Shopping">🛍️ Shopping</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Health">💊 Health</option>
            <option value="Education">📚 Education</option>
            <option value="Utilities">💡 Utilities</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="date" />
        </div>
      </div>

      <div class="form-group full-width">
        <label>Note (optional)</label>
        <input type="text" id="note" placeholder="Any extra details..." />
      </div>

      <div class="form-buttons">
        <button class="btn btn-primary" onclick="submitExpense()">
          <span id="btn-label">➕ Add Expense</span>
        </button>
        <button class="btn btn-cancel" id="cancelBtn" onclick="cancelEdit()" style="display:none">
          ✖ Cancel
        </button>
      </div>
    </div>
  </section>

  <!-- FILTER BY CATEGORY -->
  <section class="list-section">
    <div class="list-header">
      <h2 class="section-title">All Expenses</h2>
      <div class="filter-bar">
        <label>Filter by:</label>
        <select id="filterCategory" onchange="filterExpenses()">
          <option value="all">All Categories</option>
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Health">💊 Health</option>
          <option value="Education">📚 Education</option>
          <option value="Utilities">💡 Utilities</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
    </div>

    <!-- EXPENSE TABLE -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Title</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Note</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="expenseTableBody">
          <tr><td colspan="7" class="empty-msg">No expenses yet. Add one above! 👆</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
